<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}{{ app_title | default("Lite DeepLearning Studio") }}{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/styles.css') }}" />
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="/">{{ app_title | default("Lite DeepLearning Studio") }}</a>
      <span class="mode">Quick Workflow Mode</span>
    </header>
    <main class="page">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
